<script>
// STICKY NAVBAR
window.addEventListener('scroll', function() {
  let nav = document.getElementById('hx-header');
  nav.classList.toggle('hx-sticky', window.scrollY > 100);
});
</script>

<script>
let aboutStarted = false;
let factsStarted = false;

// ABOUT COUNTER (10+)
function startAboutCounter() {
  let counter = document.getElementById("expCount");
  let count = 0;
  let target = 10;

  let interval = setInterval(() => {
    count++;
    counter.innerText = count;

    if (count >= target) clearInterval(interval);
  }, 100);
}

// FACTS COUNTERS (500+, 120+, etc.)
function runFactsCounter() {
  let counters = document.querySelectorAll(".counter");

  counters.forEach(counter => {
    let target = +counter.getAttribute("data-target");
    let count = 0;
    let step = target / 50;

    let interval = setInterval(() => {
      count += step;
      counter.innerText = Math.floor(count);

      if (count >= target) {
        counter.innerText = target;
        clearInterval(interval);
      }
    }, 30);
  });
}

// SINGLE SCROLL EVENT
window.addEventListener("scroll", function () {

  // ABOUT SECTION
  let aboutBox = document.querySelector(".ab-exp-box");
  if (aboutBox && !aboutStarted) {
    let pos = aboutBox.getBoundingClientRect().top;
    if (pos < window.innerHeight) {
      startAboutCounter();
      aboutStarted = true;
    }
  }

  // FACTS SECTION
  let factsSection = document.querySelector(".fx-section");
  if (factsSection && !factsStarted) {
    let pos = factsSection.getBoundingClientRect().top;
    if (pos < window.innerHeight) {
      runFactsCounter();
      factsStarted = true;
    }
  }

});
</script>
